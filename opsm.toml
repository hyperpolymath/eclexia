#
# eclexia package manifest — OPSM native.
# This file makes eclexia a first-class OPSM/HFR package.

[package]
name = "eclexia"
description = "Eclexia compiler — economics-as-code language with formal market semantics"
license = "PMPL-1.0-or-later"
authors = ["Jonathan D.A. Jewell <j.d.a.jewell@open.ac.uk>"]
keywords = ["eclexia", "hyperpolymath", "nextgen-languages", "compiler"]
homepage = "https://github.com/hyperpolymath/nextgen-languages"
repository = "https://github.com/hyperpolymath/nextgen-languages"
forth = "eclexia"

[opsm]
trust_level = "hyperpolymath"
registry = "hf"

[dependencies]
proven = { git = "https://github.com/hyperpolymath/proven", registry = "hf" }
groove = { git = "https://github.com/hyperpolymath/groove", registry = "hf" }
